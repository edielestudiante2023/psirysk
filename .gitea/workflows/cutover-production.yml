# =============================================================================
# Pipeline Produccion — PsyRisk
# =============================================================================
# Trigger: push a main (merge de PR desde develop)
# Flujo: Validate → Trivy + Semgrep (paralelo) → Deploy Produccion → Verificacion
# Servidor: Hetzner LXC (66.29.154.174)
# =============================================================================

name: Cutover to Production

on:
  push:
    branches:
      - main

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Validacion (sintaxis + secrets)
  # -------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: PHP Lint
        run: |
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "Parse error" && exit 1 || echo "Sintaxis OK"

      - name: Scan for hardcoded secrets
        run: |
          FOUND=0
          if grep -rn "SG\.[a-zA-Z0-9_-]\{20,\}" app/ --include="*.php"; then FOUND=1; fi
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" app/ --include="*.php"; then FOUND=1; fi
          if grep -rn "sk-ant-[a-zA-Z0-9]\{20,\}" app/ --include="*.php"; then FOUND=1; fi
          if [ $FOUND -eq 1 ]; then echo "FALLO: Credenciales hardcodeadas"; exit 1; fi
          echo "OK: Sin credenciales hardcodeadas"

  # -------------------------------------------------------------------------
  # Job 2: Escaneo de vulnerabilidades (paralelo con semgrep)
  # -------------------------------------------------------------------------
  trivy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  # -------------------------------------------------------------------------
  # Job 3: Analisis estatico de seguridad (paralelo con trivy)
  # -------------------------------------------------------------------------
  semgrep:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/secrets
            p/security-audit

  # -------------------------------------------------------------------------
  # Job 4: Deploy a Produccion + Verificacion post-deploy
  # -------------------------------------------------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: [trivy, semgrep]
    steps:
      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_PATH }}
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php spark migrate
            echo "Deploy produccion completado: $(date)"

      - name: Verificacion post-deploy
        run: |
          echo "=== Verificacion post-deploy ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://psyrisk.cycloidtalent.com/ || echo "000")
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 302 ]; then
            echo "OK: Sitio respondiendo (HTTP $HTTP_CODE)"
          else
            echo "ALERTA: Sitio no responde correctamente (HTTP $HTTP_CODE)"
            exit 1
          fi
