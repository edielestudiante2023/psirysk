# =============================================================================
# Pipeline Dev/QA — PsyRisk
# =============================================================================
# Trigger: push o PR a develop o feature/*
# Flujo: Tests PHP → Trivy → Semgrep → Secrets Scan → Deploy QA (solo develop)
# =============================================================================

name: Validate and Deploy to QA

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - develop

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Verificacion de sintaxis PHP
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: PHP Lint - Verificar sintaxis
        run: |
          echo "=== Verificando sintaxis PHP ==="
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -v "No syntax errors" || true
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "Parse error" && exit 1 || echo "Sin errores de sintaxis"

  # -------------------------------------------------------------------------
  # Job 2: Escaneo de vulnerabilidades en dependencias
  # -------------------------------------------------------------------------
  trivy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  # -------------------------------------------------------------------------
  # Job 3: Analisis estatico de seguridad
  # -------------------------------------------------------------------------
  semgrep:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/secrets
            p/security-audit

  # -------------------------------------------------------------------------
  # Job 4: Busqueda de credenciales hardcodeadas
  # -------------------------------------------------------------------------
  secrets-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          echo "=== Buscando credenciales hardcodeadas ==="
          FOUND=0

          # SendGrid API Keys
          if grep -rn "SG\.[a-zA-Z0-9_-]\{20,\}" app/ --include="*.php" | grep -v ".env" | grep -v ".example"; then
            echo "ALERTA: SendGrid API Key encontrada hardcodeada"
            FOUND=1
          fi

          # OpenAI API Keys
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" app/ --include="*.php" | grep -v ".env" | grep -v ".example"; then
            echo "ALERTA: OpenAI API Key encontrada hardcodeada"
            FOUND=1
          fi

          # Database passwords hardcodeados
          if grep -rn "password.*=.*['\"][A-Za-z0-9]\{8,\}['\"]" app/ --include="*.php" | grep -vi "getenv\|env(" | grep -v ".env"; then
            echo "ALERTA: Posible password de BD hardcodeado"
            FOUND=1
          fi

          # Anthropic API Keys
          if grep -rn "sk-ant-[a-zA-Z0-9]\{20,\}" app/ --include="*.php" | grep -v ".env" | grep -v ".example"; then
            echo "ALERTA: Anthropic API Key encontrada hardcodeada"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "FALLO: Se encontraron credenciales hardcodeadas"
            exit 1
          fi

          echo "OK: No se encontraron credenciales hardcodeadas"

  # -------------------------------------------------------------------------
  # Job 5: Deploy a QA (solo en push a develop)
  # -------------------------------------------------------------------------
  deploy-qa:
    runs-on: ubuntu-latest
    needs: [trivy, semgrep, secrets-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Deploy to QA via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd ${{ secrets.QA_PATH }}
            git pull origin develop
            composer install --no-dev --optimize-autoloader
            php spark migrate
            echo "Deploy QA completado: $(date)"
